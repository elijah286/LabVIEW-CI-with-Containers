# Composite action: LabVIEW Mass Compile
#
# Demonstrates the pattern that makes centralized logic work for CONTAINER jobs:
# the action mounts its OWN directory (github.action_path) into the container, so
# the bundled script runs INSIDE the container without the consumer repo holding a
# copy of it. Pin this action by tag (@v1) to receive updates.
#
# After extraction, copy the real script next to this file:
#   cp <source>/.github/labview/masscompile.ps1 actions/masscompile/masscompile.ps1
name: 'LabVIEW Mass Compile'
description: 'Compile every VI in a LabVIEW project inside a container and publish an HTML report.'
author: 'labview-ci'

inputs:
  labview-version:
    description: 'LabVIEW year (drives the in-container LabVIEW.exe path).'
    required: false
    default: '2026'
  image:
    description: 'Container image to run in.'
    required: false
    default: 'nationalinstruments/labview:latest-windows'
  report-dir:
    description: 'Report output directory (relative to the workspace).'
    required: false
    default: 'ci-out/masscompile'
  pages-url:
    description: 'Base GitHub Pages URL (for report nav/snapshot links). Defaults to https://<owner>.github.io/<repo>.'
    required: false
    default: ''

outputs:
  report-exists:
    description: 'true when a report index.html was produced.'
    value: ${{ steps.check.outputs.exists }}
  percent:
    description: 'Percentage of project VIs that compiled (from summary.json), or empty.'
    value: ${{ steps.check.outputs.percent }}

runs:
  using: 'composite'
  steps:
    - name: Run Mass Compile inside container
      shell: powershell
      run: |
        docker pull "${{ inputs.image }}"
        # Mount the workspace AND this action's directory (which carries the script)
        # into the container. ${{ github.action_path }} is the checked-out action on
        # the runner host; mounting it makes masscompile.ps1 available at C:\ci-action.
        docker run --rm `
          -e "GITHUB_REPOSITORY=${{ github.repository }}" `
          -v "${{ github.workspace }}:C:\workspace" `
          -v "${{ github.action_path }}:C:\ci-action" `
          "${{ inputs.image }}" `
          powershell -NonInteractive -ExecutionPolicy Bypass `
            -File "C:\ci-action\masscompile.ps1" `
            -WorkspaceRoot "C:\workspace" `
            -ReportDir     "C:\workspace\${{ inputs.report-dir }}" `
            -LabVIEWPath   "C:\Program Files\National Instruments\LabVIEW ${{ inputs.labview-version }}\LabVIEW.exe"

    # Turn the plain log dump into a navigable report (problems grouped by VI,
    # snapshot drawer, Windows/Linux toggle, dashboard nav). Runs on the runner
    # host (not in the container) so it can enumerate the workspace; the bundled
    # build-masscompile-report.py is kept in sync with .github/labview/.
    - name: Build friendly Mass Compile report
      shell: bash
      continue-on-error: true
      run: |
        REPORT_DIR="${{ github.workspace }}/${{ inputs.report-dir }}"
        [ -f "$REPORT_DIR/index.html" ] || exit 0
        PAGES="${{ inputs.pages-url }}"
        if [ -z "$PAGES" ]; then
          owner="${GITHUB_REPOSITORY%%/*}"; repo="${GITHUB_REPOSITORY#*/}"
          PAGES="https://${owner}.github.io/${repo}"
        fi
        python "${{ github.action_path }}/build-masscompile-report.py" \
          --log        "$REPORT_DIR/masscompile.log" \
          --workspace  "${{ github.workspace }}" \
          --out        "$REPORT_DIR" \
          --platform   windows \
          --meta       "$REPORT_DIR/summary.json" \
          --sha        "${{ github.sha }}" \
          --repo       "${{ github.repository }}" \
          --pages-url  "$PAGES" \
          --labview-version "${{ inputs.labview-version }}" \
          --commit-msg "$(git log -1 --pretty=%s)" \
          --author     "$(git log -1 --pretty=%an)" \
          --date       "$(git log -1 --pretty=%cI)"

    - name: Check report directory
      id: check
      shell: bash
      run: |
        REPORT_DIR="${{ github.workspace }}/${{ inputs.report-dir }}"
        if [ -f "$REPORT_DIR/index.html" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
        PCT=""
        if [ -f "$REPORT_DIR/summary.json" ]; then
          PCT=$(grep -o '"percent"[: ]*[0-9]*' "$REPORT_DIR/summary.json" | grep -o '[0-9]*$' || true)
        fi
        echo "percent=$PCT" >> "$GITHUB_OUTPUT"
