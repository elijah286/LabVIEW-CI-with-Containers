# Reusable workflow (lives at .github/workflows/ in the standalone labview-ci repo).
# Consumers call this with `uses: your-org/labview-ci/.github/workflows/labview-ci.reusable.yml@v1`.
#
# This is where repo settings actually DRIVE behavior: a `config` job reads the
# consumer's .github/labview-ci.yml via the load-config action, and each activity
# job is gated on it + on the platform flags. So toggling an activity or platform
# in "Configure Workers" turns the corresponding job on/off here — no per-repo
# workflow edits. The consumer's thin caller owns only the triggers and Pages.
name: LabVIEW CI (reusable)
run-name: LabVIEW CI reusable workflow - ${{ github.event_name == 'workflow_dispatch' && 'manual run' || github.sha }}

on:
  workflow_call:
    inputs:
      labview-version:
        description: 'LabVIEW year (overrides labview-ci.yml when set)'
        type: string
        required: false
        default: ''
      windows-runner:
        description: 'Runner label for Windows container jobs'
        type: string
        required: false
        default: 'windows-2022'
      image:
        description: 'Container image to run in'
        type: string
        required: false
        default: 'nationalinstruments/labview:latest-windows'

jobs:
  # 1) Read the repo's config once and expose it to the gated jobs below.
  config:
    runs-on: ubuntu-latest
    outputs:
      labview-version: ${{ steps.cfg.outputs.labview-version }}
      os-windows:      ${{ steps.cfg.outputs.os-windows }}
      os-linux:        ${{ steps.cfg.outputs.os-linux }}
      has-masscompile: ${{ steps.cfg.outputs.has-masscompile }}
      has-vi-analyzer: ${{ steps.cfg.outputs.has-vi-analyzer }}
      has-vidiff:      ${{ steps.cfg.outputs.has-vidiff }}
      has-snapshots:   ${{ steps.cfg.outputs.has-snapshots }}
      # The capability version this repo has OPTED INTO, read from the consumer's
      # own .github/labview-ci.yml (source.ref). The capability jobs check out the
      # tooling at this ref and run it, so a repo only changes versions when it
      # edits that config file (via the token-free "Update now" button) — never
      # automatically. Defaults to v1 when the config omits a ref.
      tooling-ref:     ${{ steps.ref.outputs.ref }}
    steps:
      - uses: actions/checkout@v5
      - id: cfg
        # Full repo path (not ./actions/...): inside a reusable workflow a ./ path
        # resolves against the CALLER's checked-out workspace, which doesn't contain
        # this repo's actions. Pin to the same major alias consumers use (@v1).
        uses: elijah286/LabVIEW-CI-with-Containers/actions/load-config@v1
      - id: ref
        shell: bash
        run: |
          REF=$(awk '/^[[:space:]]*ref:[[:space:]]/{print $2; exit}' .github/labview-ci.yml 2>/dev/null)
          echo "ref=${REF:-v1}" >> "$GITHUB_OUTPUT"
          echo "Capability version (source.ref) this repo opted into: ${REF:-v1}"

  # 1b) Dependency gate. If a worker rebuild is in progress for this SHA (an
  #     opt-in dependency update, or a worker-input change), the container
  #     activities must wait for the new image BEFORE they run against it. This
  #     job blocks on the worker image build(s) for this SHA; the activities below
  #     that consume the custom worker image depend on it. No worker build in
  #     flight => the helper exits immediately. A repo without the custom-image
  #     capability has no helper script, so the gate is skipped.
  gate-images:
    needs: config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Wait for worker image rebuild (dependency gate)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .github/labview/wait-for-worker-images.sh ]; then
            bash .github/labview/wait-for-worker-images.sh \
              --sha "${{ github.sha }}" \
              --before "${{ github.event.before }}" \
              --repo "${{ github.repository }}"
          else
            echo "wait-for-worker-images.sh not present; skipping container dependency gate."
          fi

  # 2) Each activity job runs only when its capability is active AND the platform
  #    is selected. Changing either in Configure Workers flips these gates.
  mass-compile:
    needs: [config, gate-images]
    if: ${{ needs.config.outputs.has-masscompile == 'true' && needs.config.outputs.os-windows == 'true' }}
    runs-on: ${{ inputs.windows-runner }}
    permissions:
      contents: write    # peaceiris deploys the report to gh-pages
      statuses: write     # post the CI / Mass Compile commit status
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve Pages URL
        id: pages
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_URL }}" ]; then
            echo "url=${{ vars.PAGES_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"description\":\"Mass Compile in progress\",\"context\":\"CI / Mass Compile\"}"

      # Reference the composite action at the version this repo OPTED INTO
      # (config source.ref), checked out at runtime, so the capability never
      # changes version automatically — only when the config is updated.
      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v5
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ needs.config.outputs.tooling-ref }}
          path: _lvci
      - name: Mass Compile
        id: compile
        continue-on-error: true
        uses: ./_lvci/actions/masscompile
        with:
          labview-version: ${{ inputs.labview-version || needs.config.outputs.labview-version }}
          image: ${{ inputs.image }}
          sha: ${{ github.sha }}
          repo: ${{ github.repository }}
          pages-url: ${{ steps.pages.outputs.url }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: masscompile-report
          path: ci-out/masscompile/
          if-no-files-found: warn

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        if: steps.compile.outputs.report-exists == 'true'
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Deploy report to GitHub Pages
        if: steps.compile.outputs.report-exists == 'true'
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/masscompile
          destination_dir: masscompile/${{ github.sha }}

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.compile.outputs.report-exists }}" = "true" ]; then
            URL="${{ steps.pages.outputs.url }}/masscompile/${GITHUB_SHA}/index.html"
          else
            URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          [ "${{ steps.compile.outcome }}" = "success" ] && STATE="success" || STATE="failure"
          PCT="${{ steps.compile.outputs.percent }}"
          if [ -n "$PCT" ]; then DESC="${PCT}% of project VIs compiled"; else DESC="Mass Compile $STATE"; fi
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$URL\",\"description\":\"$DESC\",\"context\":\"CI / Mass Compile\"}"

      - name: Fail the job if compile failed
        if: always() && steps.compile.outcome != 'success'
        run: exit 1

  # VI Analyzer (Windows container). Runs the analyzer over the project, publishes
  # the friendly report to the caller's Pages, and posts the "CI / VI Analyzer"
  # commit status so the caller's dashboard shows the result. Requires the custom
  # LabVIEW CI image (built by the consumer's build-labview-image workflow).
  vi-analyzer:
    needs: [config, gate-images]
    if: ${{ needs.config.outputs.has-vi-analyzer == 'true' && needs.config.outputs.os-windows == 'true' }}
    runs-on: ${{ inputs.windows-runner }}
    permissions:
      contents: write    # peaceiris deploys the report to gh-pages
      statuses: write     # post the CI / VI Analyzer commit status
      packages: read      # pull the custom image from GHCR
    steps:
      - name: Resolve container image name (GHCR requires lowercase)
        id: img
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          IMAGE_TAG: ${{ inputs.labview-version || needs.config.outputs.labview-version || '2026' }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${owner}/${name}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve Pages URL
        id: pages
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_URL }}" ]; then
            echo "url=${{ vars.PAGES_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"description\":\"VI Analyzer in progress\",\"context\":\"CI / VI Analyzer\"}"

      - name: Checkout caller repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($null -eq $svc) { throw 'Docker service not found on this runner.' }
          if ($svc.Status -ne 'Running') { Start-Service docker }
          docker version

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull LabVIEW container image
        id: pull
        shell: powershell
        run: docker pull "${{ steps.img.outputs.ref }}"
        continue-on-error: true

      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v5
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ needs.config.outputs.tooling-ref }}
          path: _lvci
      - name: Run VI Analyzer
        id: analyze
        if: steps.pull.outcome == 'success'
        continue-on-error: true
        uses: ./_lvci/actions/vi-analyzer
        with:
          image: ${{ steps.img.outputs.ref }}
          labview-version: ${{ inputs.labview-version || needs.config.outputs.labview-version }}
          sha: ${{ github.sha }}
          repo: ${{ github.repository }}
          pages-url: ${{ steps.pages.outputs.url }}

      - name: Upload report artifact
        if: steps.analyze.outputs.report-exists == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: vi-analyzer-report-${{ github.sha }}
          path: ci-out/vi-analyzer/
          if-no-files-found: warn

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        if: steps.analyze.outputs.report-exists == 'true'
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Deploy report to GitHub Pages
        if: steps.analyze.outputs.report-exists == 'true'
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/vi-analyzer
          destination_dir: vi-analyzer/${{ github.sha }}

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.analyze.outputs.report-exists }}" = "true" ]; then
            URL="${{ steps.pages.outputs.url }}/vi-analyzer/${GITHUB_SHA}/index.html"
          else
            URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
          if [ "${{ steps.pull.outcome }}" = "success" ] && [ "${{ steps.analyze.outcome }}" = "success" ]; then
            STATE="success"
          else
            STATE="failure"
          fi
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$URL\",\"description\":\"VI Analyzer $STATE\",\"context\":\"CI / VI Analyzer\"}"

      - name: Fail the job if analysis failed
        if: always() && (steps.pull.outcome != 'success' || steps.analyze.outcome != 'success')
        run: exit 1

  # VIDiff (Windows container). Renders visual diffs for changed VIs between the
  # base and head commits, deploys them to the caller's Pages, and posts the
  # "CI / VIDiff" status. Runs on the NI base image (no custom image needed).
  vidiff:
    needs: [config, gate-images]
    if: ${{ needs.config.outputs.has-vidiff == 'true' && needs.config.outputs.os-windows == 'true' }}
    runs-on: ${{ inputs.windows-runner }}
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Determine SHAs
        id: shas
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            HEAD="${{ github.event.pull_request.head.sha }}"
            BASE="${{ github.event.pull_request.base.sha }}"
            PR="${{ github.event.pull_request.number }}"
          else
            HEAD="${{ github.sha }}"
            BASE="${{ github.event.before }}"
            PR=""
          fi
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "pr=$PR" >> "$GITHUB_OUTPUT"

      - name: Resolve Pages URL
        id: pages
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_URL }}" ]; then
            echo "url=${{ vars.PAGES_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ steps.shas.outputs.pr }}" ]; then
            echo "dest=vidiff/pr-${{ steps.shas.outputs.pr }}/windows" >> "$GITHUB_OUTPUT"
          else
            echo "dest=vidiff/push-${{ steps.shas.outputs.head }}/windows" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${{ steps.shas.outputs.head }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"description\":\"VIDiff in progress\",\"context\":\"CI / VIDiff\"}"

      - name: Checkout head commit
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.shas.outputs.head }}
          fetch-depth: 0
          path: head

      - name: Checkout base commit
        uses: actions/checkout@v5
        if: steps.shas.outputs.base != ''
        with:
          ref: ${{ steps.shas.outputs.base }}
          path: base

      - name: Get changed VI/CTL files
        id: changed
        shell: bash
        working-directory: head
        run: |
          if [ -n "${{ steps.shas.outputs.base }}" ]; then
            FILES=$(git diff --name-only "${{ steps.shas.outputs.base }}" "${{ steps.shas.outputs.head }}" -- '*.vi' '*.ctl')
          else
            FILES=$(git diff-tree --no-commit-id -r --name-only "${{ steps.shas.outputs.head }}" -- '*.vi' '*.ctl')
          fi
          { echo "files<<EOF"; echo "$FILES"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($null -eq $svc) { throw 'Docker service not found on this runner.' }
          if ($svc.Status -ne 'Running') { Start-Service docker }
          docker version

      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v5
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ needs.config.outputs.tooling-ref }}
          path: _lvci
      - name: VIDiff
        id: diff
        continue-on-error: true
        uses: ./_lvci/actions/vidiff
        with:
          image: ${{ inputs.image }}
          labview-version: ${{ inputs.labview-version || needs.config.outputs.labview-version }}
          head-dir: head
          base-dir: base
          changed-files: ${{ steps.changed.outputs.files }}
          report-dir: ci-out/vidiff

      - name: Enable Git long paths (Windows MAX_PATH workaround)
        if: steps.diff.outputs.report-exists == 'true'
        shell: bash
        run: |
          git config --global core.longpaths true
          git config --system core.longpaths true || true

      - name: Deploy VIDiff report to GitHub Pages
        if: steps.diff.outputs.report-exists == 'true'
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: head/ci-out/vidiff
          destination_dir: ${{ steps.pages.outputs.dest }}

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.diff.outputs.report-exists }}" = "true" ]; then
            URL="${{ steps.pages.outputs.url }}/${{ steps.pages.outputs.dest }}/vidiff/index.html"
            STATE="success"
          else
            URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            [ "${{ steps.diff.outcome }}" = "success" ] && STATE="success" || STATE="failure"
          fi
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${{ steps.shas.outputs.head }}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$URL\",\"description\":\"VIDiff $STATE\",\"context\":\"CI / VIDiff\"}"

      - name: Fail the job if diff failed
        if: always() && steps.diff.outcome != 'success'
        run: exit 1

  # VI Snapshots + VI Browser (Windows container). Renders the block-diagram
  # gallery, deploys it to the caller's Pages, and posts the "CI / VI Snapshots"
  # status. Incremental: seeds from the already-deployed gallery so it only renders
  # new VIs.
  snapshots:
    needs: config
    if: ${{ needs.config.outputs.has-snapshots == 'true' && needs.config.outputs.os-windows == 'true' }}
    runs-on: ${{ inputs.windows-runner }}
    timeout-minutes: 350
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout caller repository (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout deployed gallery (gh-pages) for incremental seeding
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          ref: gh-pages
          path: _pages
          sparse-checkout: vi-snapshots/by-blob
          sparse-checkout-cone-mode: false

      - name: Resolve Pages URL
        id: pages
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_URL }}" ]; then
            echo "url=${{ vars.PAGES_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service -Name docker -ErrorAction SilentlyContinue
          if ($null -eq $svc) { throw 'Docker service not found on this runner.' }
          if ($svc.Status -ne 'Running') { Start-Service docker }
          docker version

      - name: Post pending status
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\",\"description\":\"VI Snapshots in progress\",\"context\":\"CI / VI Snapshots\"}"

      - name: Check out tooling (opted-in version)
        uses: actions/checkout@v5
        with:
          repository: elijah286/LabVIEW-CI-with-Containers
          ref: ${{ needs.config.outputs.tooling-ref }}
          path: _lvci
      - name: VI Snapshots
        id: snap
        continue-on-error: true
        uses: ./_lvci/actions/snapshots
        with:
          image: ${{ inputs.image }}
          mode: head
          target-sha: ${{ github.sha }}
          out-dir: ci-out/vi-snapshots
          existing-by-blob-dir: ${{ github.workspace }}/_pages/vi-snapshots/by-blob

      - name: Deploy snapshots to GitHub Pages
        if: steps.snap.outputs.gallery-ok == 'true'
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/vi-snapshots
          destination_dir: vi-snapshots

      - name: Post commit status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="${{ steps.pages.outputs.url }}/vi-snapshots/index.html"
          if [ "${{ steps.snap.outcome }}" = "success" ] && [ "${{ steps.snap.outputs.gallery-ok }}" = "true" ]; then
            STATE="success"
          else
            STATE="failure"
          fi
          curl -s -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$URL\",\"description\":\"VI Snapshots $STATE\",\"context\":\"CI / VI Snapshots\"}"

      - name: Fail the job if snapshots failed
        if: always() && (steps.snap.outcome != 'success' || steps.snap.outputs.gallery-ok != 'true')
        run: exit 1

