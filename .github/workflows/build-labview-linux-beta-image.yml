name: Build LabVIEW CI Image - Linux Beta
run-name: ${{ github.event_name == 'push' && 'Copy Linux Beta worker image (seed from LCWC base, no build)' || 'Build Linux Beta worker image (apply dependencies)' }}

on:
  # Never auto-triggered by a project dependency change: adding/changing a project
  # *.vipc does NOT rebuild. Rebuilds only when the tooling's own beta build recipe
  # changes, monthly for base-image security, or on demand (dashboard / dispatch).
  push:
    branches: [main]
    paths:
      - '.github/docker/labview-ci-linux-beta.Dockerfile'
      - '.github/labview/vipm/**'
      - '.github/workflows/build-labview-linux-beta-image.yml'
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Deprecated -- :linux-beta-latest is always published now (kept for compatibility)'
        type: boolean
        default: true

env:
  IMAGE_NAME: ''
  PAGES_URL: ''
  DEFAULT_TAG: linux-beta-${{ vars.LABVIEW_VERSION || '2026' }}
  # Shared LCWC Linux Beta worker image, owned by the source repo's GHCR. Clients
  # COPY this image into their own GHCR package on install instead of rebuilding it.
  # Source detection derives the owning repo from this (lowercase) image name, so the
  # installer's branding rewrite never makes a client think it is the source.
  LCWC_LINUX_BETA_BASE_IMAGE: ${{ vars.LCWC_LINUX_BETA_BASE_IMAGE || 'ghcr.io/elijah286/labview-ci-with-containers-labview:linux-beta-2026' }}

permissions:
  contents: write
  packages: write

concurrency:
  group: build-labview-linux-beta-image
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up crane (registry copy tool)
        run: |
          ver=v0.20.2
          url="https://github.com/google/go-containerregistry/releases/download/${ver}/go-containerregistry_Linux_x86_64.tar.gz"
          tmp="$(mktemp -d)"
          curl -fsSL "$url" | tar -xz -C "$tmp"
          echo "$tmp" >> "$GITHUB_PATH"
          "$tmp/crane" version

      - name: Resolve image name and date tag
        id: date
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          PAGES_URL_OVERRIDE: ${{ vars.PAGES_URL }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=ghcr.io/${owner}/${name}" >> "$GITHUB_ENV"
          echo "PAGES_URL=${PAGES_URL_OVERRIDE:-https://${owner}.github.io/${GITHUB_REPOSITORY##*/}}" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          # Derive the source repo that OWNS the shared LCWC Linux Beta base image
          # (ghcr.io/<owner>/<name>-labview -> <owner>/<name>). Only that repo BUILDS the
          # base; every other repo is a client that COPIES it. Deriving the identity from
          # the (lowercase) image name keeps it immune to the installer's branding rewrite.
          base_repo="${LCWC_LINUX_BETA_BASE_IMAGE%:*}"
          src_slug="${base_repo#*/}"; src_slug="${src_slug%-labview}"
          this_repo="$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          if [ "$this_repo" = "$(printf '%s' "$src_slug" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "is_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_source=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage repo VIPC files
        id: vipc
        shell: bash
        run: |
          python3 - <<'PY'
          import os, re, glob, shutil, pathlib
          dest = pathlib.Path('.github/labview/vipm-linux'); dest.mkdir(parents=True, exist_ok=True)
          # Install/seed (and tooling-recipe pushes) must NEVER bake project dependencies, so a
          # fresh install is a constant-time base build no matter how many .vipc / .dragon files
          # the repo ships. Project VIPC is staged (and baked) only on an explicit dependency
          # rebuild: a manual workflow_dispatch from the Dependencies page, or the monthly
          # base-image rebuild (schedule). On a push (the install merge or a tooling update) the
          # worker is seeded as a plain NI + LabVIEW base and the dashboard then flags any
          # project dependencies for an opt-in apply.
          if os.environ.get('GITHUB_EVENT_NAME', '') == 'push':
              print('Install/seed (push): skipping project VIPC staging so install time stays constant regardless of how many .vipc/.dragon files the repo has; dependencies are applied later via an opt-in rebuild.')
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
                  out.write('count=0\n')
              raise SystemExit(0)
          cfg = pathlib.Path('.github/labview-ci.yml')

          def configured_vipcs():
              selected = []
              saw_list = False
              cur = None
              if not cfg.exists():
                  return selected, saw_list
              in_container = False
              in_vipc = False
              for line in cfg.read_text(encoding='utf-8').splitlines():
                  if re.match(r'^\s*container:\s*$', line):
                      in_container = True; in_vipc = False; cur = None; continue
                  if not in_container:
                      continue
                  if re.match(r'^\S', line):
                      in_container = False; in_vipc = False; cur = None; continue
                  if re.match(r'^\s{4}vipc:\s*$', line):
                      in_vipc = True; saw_list = True; cur = None; continue
                  if re.match(r'^\s{4}\w+:\s*$', line):
                      in_vipc = False; cur = None; continue
                  if re.match(r'^\s{4}\w+:\s*\S', line):
                      in_vipc = False; cur = None; continue
                  if in_vipc:
                      match = re.match(r'^\s{6}-\s*path:\s*"?([^"]+?)"?\s*$', line)
                      if match:
                          cur = match.group(1).strip().replace('\\', '/')
                          continue
                      match = re.match(r'^\s{8}monitor:\s*(\S+)', line)
                      if match and cur is not None:
                          if match.group(1).strip().lower() == 'true':
                              selected.append(cur)
                          cur = None
              return selected, saw_list

          paths, saw_vipc_list = configured_vipcs()
          if not paths and not saw_vipc_list:
              paths = sorted(
                  p for p in glob.glob('**/*.vipc', recursive=True)
                  if not p.replace(os.sep, '/').startswith('.github/')
              )
          staged = 0
          for path in paths:
              if os.path.isfile(path):
                  shutil.copy2(path, dest / os.path.basename(path))
                  print('Staged VIPC:', path)
                  staged += 1
              else:
                  print('Configured VIPC not found (skipping):', path)
          if not staged:
              print('No VIPC files to stage.')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
              out.write(f'count={staged}\n')
          PY
      - name: Compute worker version
        id: ver
        env:
          IS_SOURCE: ${{ steps.date.outputs.is_source }}
          VIPC_COUNT: ${{ steps.vipc.outputs.count }}
        run: |
          python3 - <<'PY'
          import hashlib, os, pathlib, subprocess
          is_source = os.environ.get('IS_SOURCE', '') == 'true'
          vipc_count = int(os.environ.get('VIPC_COUNT', '0') or '0')
          if (not is_source) and vipc_count == 0:
              # Client install/seed: the worker is a registry COPY of the shared LCWC Linux
              # Beta base, so the immutable version reflects that base image + its digest.
              base = os.environ['LCWC_LINUX_BETA_BASE_IMAGE']
              digest = subprocess.check_output(['crane', 'digest', base], text=True).strip()
              parts = [f'lcwc-linux-beta-base-image={base}', f'lcwc-linux-beta-base-digest={digest}', 'vipc-count=0']
              print('Copy path: worker version derived from the LCWC Linux Beta base digest.')
          else:
              files = [
                  pathlib.Path('.github/docker/labview-ci-linux-beta.Dockerfile'),
                  pathlib.Path('.github/labview/vipm/install-vipc-linux.sh'),
              ]
              files += sorted(pathlib.Path('.github/labview/vipm-linux').glob('*.vipc'), key=lambda p: p.name.lower())
              parts = []
              for path in files:
                  if path.exists():
                      parts.append(f'{path.name}={hashlib.sha256(path.read_bytes()).hexdigest()}')
          version = 'linux-beta-' + hashlib.sha256('\n'.join(parts).encode('utf-8')).hexdigest()[:12]
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f'version={version}\n')
          print('Worker version:', version)
          PY

      - name: Build and push LabVIEW Linux Beta CI image
        env:
          VIPM_SERIAL_NUMBER: ${{ secrets.VIPM_SERIAL_NUMBER }}
          VIPM_FULL_NAME: ${{ secrets.VIPM_FULL_NAME }}
          VIPM_EMAIL: ${{ secrets.VIPM_EMAIL }}
          IS_SOURCE: ${{ steps.date.outputs.is_source }}
          VIPC_COUNT: ${{ steps.vipc.outputs.count }}
        run: |
          set -euo pipefail
          base="${{ env.IMAGE_NAME }}"
          tag="${{ env.DEFAULT_TAG }}"
          date_tag="${{ steps.date.outputs.date }}"
          worker_version="${{ steps.ver.outputs.version }}"
          lcwc_base="${LCWC_LINUX_BETA_BASE_IMAGE}"

          if [ "${IS_SOURCE}" != "true" ] && [ "${VIPC_COUNT:-0}" = "0" ]; then
            # CLIENT install/seed: duplicate the shared LCWC Linux Beta worker image into
            # this repository's own GHCR package with crane -- a registry-to-registry copy,
            # no rebuild. The client owns the copy and can bake dependencies onto it later.
            echo "::notice::Copying the shared LCWC Linux Beta worker image (${lcwc_base}) into ${base} with crane -- no rebuild. The client owns this independent duplicate."
            immutable="${base}:${worker_version}"
            crane copy "${lcwc_base}" "${immutable}"
            for t in "${tag}" "${tag}-${date_tag}" "linux-beta-latest"; do
              crane tag "${immutable}" "${t}"
              echo "Published (registry copy): ${base}:${t}"
            done
            exit 0
          fi

          # SOURCE base build, or a deliberate client dependency bake: docker buildx build.
          secret_flags=()
          if [ -n "${VIPM_SERIAL_NUMBER:-}" ]; then secret_flags+=(--secret id=vipm_serial,env=VIPM_SERIAL_NUMBER); fi
          if [ -n "${VIPM_FULL_NAME:-}" ]; then secret_flags+=(--secret id=vipm_full_name,env=VIPM_FULL_NAME); fi
          if [ -n "${VIPM_EMAIL:-}" ]; then secret_flags+=(--secret id=vipm_email,env=VIPM_EMAIL); fi

          docker buildx build \
            --platform linux/amd64 \
            --file .github/docker/labview-ci-linux-beta.Dockerfile \
            --build-arg CI_WORKER_VERSION="${worker_version}" \
            --build-arg LABVIEW_VERSION="${{ vars.LABVIEW_VERSION || '2026' }}" \
            -t "${base}:${tag}" \
            -t "${base}:${tag}-${date_tag}" \
            -t "${base}:${worker_version}" \
            -t "${base}:linux-beta-latest" \
            "${secret_flags[@]}" \
            --load \
            .

          for image_tag in "${base}:${tag}" "${base}:${tag}-${date_tag}" "${base}:${worker_version}" "${base}:linux-beta-latest"; do
            docker push "$image_tag"
          done

      - name: Generate worker manifest
        env:
          IS_SOURCE: ${{ steps.date.outputs.is_source }}
          VIPC_COUNT: ${{ steps.vipc.outputs.count }}
        run: |
          set -euo pipefail
          worker_version="${{ steps.ver.outputs.version }}"
          image_ref="${{ env.IMAGE_NAME }}:${worker_version}"
          out_dir="ci-out/workers-pages/workers/linux-beta/${worker_version}"
          mkdir -p ci-out/worker "$out_dir"
          : > ci-out/worker/nipkg-list.txt
          : > ci-out/worker/vipm-list.txt
          vipc_args=()

          if [ "${IS_SOURCE}" != "true" ] && [ "${VIPC_COUNT:-0}" = "0" ]; then
            # Seed-only copy: the worker mirrors the LCWC Linux Beta base and is NOT present
            # locally (copied at the registry level), so read base metadata with crane.
            base_image="${LCWC_LINUX_BETA_BASE_IMAGE}"
            base_digest="$(crane digest "${LCWC_LINUX_BETA_BASE_IMAGE}" 2>/dev/null || true)"
          else
            docker run --rm "$image_ref" bash -lc "nipkg list" > ci-out/worker/nipkg-list.txt 2>/dev/null || : > ci-out/worker/nipkg-list.txt
            docker run --rm "$image_ref" bash -lc "vipm list --installed" > ci-out/worker/vipm-list.txt 2>/dev/null || : > ci-out/worker/vipm-list.txt
            base_image="nationalinstruments/labview:latest-linux"
            base_digest=$(docker inspect --format '{{index .RepoDigests 0}}' "$image_ref" 2>/dev/null || true)
            while IFS= read -r -d '' vipc_file; do
              vipc_args+=(--vipc "$vipc_file")
            done < <(find .github/labview/vipm-linux -maxdepth 1 -type f -iname '*.vipc' -print0 | sort -z)
          fi

          python3 .github/labview/build-worker-manifest.py \
            --platform linux-beta \
            --version "$worker_version" \
            --nipkg-list ci-out/worker/nipkg-list.txt \
            --vipm-list ci-out/worker/vipm-list.txt \
            --labview-version "${{ vars.LABVIEW_VERSION || '2026' }}" \
            --pages-url "${{ env.PAGES_URL }}" \
            --base-image "$base_image" \
            --base-digest "$base_digest" \
            --image-ref "$image_ref" \
            --git-sha "${{ github.sha }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --out-dir "$out_dir" \
            "${vipc_args[@]}"

          cat > "ci-out/workers-pages/workers/linux-beta/latest.json" <<JSON
          {
            "version": "$worker_version",
            "platform": "linux-beta",
            "manifest_url": "${{ env.PAGES_URL }}/workers/linux-beta/$worker_version/manifest.html",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_sha": "${{ github.sha }}"
          }
          JSON

      - name: Publish worker manifest to GitHub Pages
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ci-out/workers-pages
          destination_dir: .

      - name: Summary
        run: |
          echo "### Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}-${{ steps.date.outputs.date }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}\` (immutable worker tag)" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ env.IMAGE_NAME }}:linux-beta-latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Worker version:** \`${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "[Worker manifest](${{ env.PAGES_URL }}/workers/linux-beta/${{ steps.ver.outputs.version }}/manifest.html)" >> "$GITHUB_STEP_SUMMARY"
