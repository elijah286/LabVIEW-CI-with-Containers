name: toimages COM probe (diagnostic)

# Diagnostic ONLY (workflow_dispatch). Confirms whether the vendored
# toimages\Convert.vi can be driven via LabVIEW's ActiveX/COM server inside the
# stock NI LabVIEW Windows container to emit the position-aware frames JSON that
# powers VI Browser 2.0. Touches nothing in production: it renders a few example
# VIs to JSON and prints the result to the log (and uploads it as an artifact).

on:
  workflow_dispatch:
    inputs:
      vi:
        description: "Example VI path (relative to repo root) to convert"
        required: false
        default: "example/main.vi"

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

permissions:
  contents: read

jobs:
  probe:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker daemon is running
        shell: powershell
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if (-not $svc) { Write-Error 'Docker service not found on runner'; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service docker; Start-Sleep -Seconds 5 }
          docker version

      - name: Run COM probe in the LabVIEW container
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          $image = $Env:LABVIEW_CONTAINER_IMAGE
          Write-Host "Pulling $image ..."
          docker pull $image | Out-Null

          $repo = "${{ github.workspace }}"
          $name = "toimages-probe-$([System.Guid]::NewGuid().ToString('N').Substring(0,8))"
          $target = "C:\repo\" + ("${{ github.event.inputs.vi }}" -replace '/', '\')

          Write-Host "Starting container $name ..."
          docker run -d --name $name -v "${repo}:C:\repo" $image `
            powershell -NoProfile -Command "while (`$true) { Start-Sleep -Seconds 3600 }" | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Error "container start failed"; exit 1 }

          try {
            Write-Host "exec probe (-File), target=$target"
            docker exec $name powershell -NoProfile -ExecutionPolicy Bypass `
              -File 'C:\repo\.github\labview\toimages-probe.ps1' `
              -ConvertVI 'C:\repo\.github\labview\toimages\Convert.vi' `
              -TargetVI $target `
              -OutDir 'C:\repo\_probe-out'
            Write-Host "probe exit code: $LASTEXITCODE"

            # Copy the JSON out of the container for inspection / artifact upload.
            New-Item -ItemType Directory -Force -Path "$repo\_probe-out" | Out-Null
            docker cp "${name}:C:\repo\_probe-out\." "$repo\_probe-out" 2>$null
            Write-Host "=== probe outputs ==="
            Get-ChildItem "$repo\_probe-out" -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host ("  {0}  ({1} bytes)" -f $_.Name, $_.Length)
            }
          }
          finally {
            docker rm -f $name | Out-Null
          }

      - name: Upload probe JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toimages-probe-out
          path: _probe-out/
          if-no-files-found: ignore
