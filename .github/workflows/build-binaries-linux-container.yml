name: Build Binaries — Linux Container
run-name: Build Binaries Linux container - ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit_sha || github.event.pull_request.head.sha || github.sha }}

# Linux counterpart of the Windows build. Executes each build specification the
# Linux LabVIEW can build (EXE, PPL, shared library, source distribution, zip),
# skipping Windows-only types (Installer, .NET Interop). Publishes the Builds
# report under builds/<sha>/linux/, uploads artifacts, and promotes them on a tag.

on:
  pull_request:
    paths:
      - '**.vi'
      - '**.ctl'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvclass'
      - '!.github/**'
  push:
    branches: [main]
    paths:
      - '**.vi'
      - '**.ctl'
      - '**.lvproj'
      - '**.lvlib'
      - '**.lvclass'
      - '!.github/**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to build (leave blank for current HEAD)'
        required: false
        default: ''

env:
  LABVIEW_CONTAINER_IMAGE: ''
  PAGES_URL: ${{ vars.PAGES_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}

permissions:
  contents: write
  pages: write
  statuses: write
  packages: read
  actions: read

jobs:
  build-binaries-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Determine target SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT="${{ github.event.inputs.commit_sha }}"
          if [ -n "$INPUT" ]; then
            FULL=$(gh api "repos/${{ github.repository }}/commits/$INPUT" --jq '.sha')
            echo "sha=$FULL" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Post pending status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"pending\",\"target_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\",\"description\":\"Build (Linux) in progress\",\"context\":\"CI / Builds (Linux)\"}"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.sha.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git checkout FETCH_HEAD -- .github/labview .github/workflows .github/actions/publish-gh-pages

      - name: Resolve Linux container image name
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
          ACTION_ID: builds
        run: |
          selected=$(python3 - <<'PY'
          import os, pathlib, re
          action_id = os.environ.get('ACTION_ID', '')
          cfg = pathlib.Path('.github/labview-ci.yml')
          use = ''
          actions = {}
          if cfg.exists():
              section = ''
              for line in cfg.read_text(encoding='utf-8').splitlines():
                  if re.match(r'^\s*container:\s*$', line): section = 'container'; continue
                  if section == 'container':
                      match = re.match(r'^\s{4}use:\s*"?([^"#]+)"?', line)
                      if match: use = match.group(1).strip()
                      if re.match(r'^\s{4}actions:\s*$', line): section = 'actions'; continue
                  elif section == 'actions':
                      match = re.match(r'^\s{6}([A-Za-z0-9_.-]+):\s*"?([^"#]+)"?', line)
                      if match: actions[match.group(1)] = match.group(2).strip()
                      if re.match(r'^\s{0,4}\S', line): section = 'container'
          print(actions.get(action_id) or use or '')
          PY
          )
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          case "$selected" in
            ''|latest) image="ghcr.io/${owner}/${name}:linux-latest"; worker_workflow="Build LabVIEW CI Image - Linux" ;;
            base|none) image="nationalinstruments/labview:latest-linux"; worker_workflow="" ;;
            linux-beta-*) image="ghcr.io/${owner}/${name}:${selected}"; worker_workflow="Build LabVIEW CI Image - Linux Beta" ;;
            linux-*) image="ghcr.io/${owner}/${name}:${selected}"; worker_workflow="Build LabVIEW CI Image - Linux" ;;
            *) image="ghcr.io/${owner}/${name}:linux-${selected}"; worker_workflow="Build LabVIEW CI Image - Linux" ;;
          esac
          echo "LABVIEW_CONTAINER_IMAGE=$image" >> "$GITHUB_ENV"
          echo "LINUX_WORKER_WORKFLOW=$worker_workflow" >> "$GITHUB_ENV"
          echo "Using Linux container image: $image"

      - name: Wait for Linux worker image build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$LABVIEW_CONTAINER_IMAGE" = "nationalinstruments/labview:latest-linux" ]; then
            echo "Using the NI Linux base image; no Linux worker build to wait for."
            exit 0
          fi
          bash .github/labview/wait-for-worker-image.sh "${{ steps.sha.outputs.sha }}" "${{ github.event.before }}" "$LINUX_WORKER_WORKFLOW"

      - name: Log in to GHCR
        if: env.LABVIEW_CONTAINER_IMAGE != 'nationalinstruments/labview:latest-linux'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull LabVIEW Linux container
        id: pull
        run: docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}
        continue-on-error: true

      - name: Run build specifications inside Linux container
        if: steps.pull.outcome == 'success'
        id: build
        run: |
          mkdir -p "${{ github.workspace }}/ci-out/builds"
          docker run --rm \
            -e "GITHUB_REPOSITORY=${{ github.repository }}" \
            -e "GITHUB_SHA=${{ steps.sha.outputs.sha }}" \
            -e "GITHUB_REF=${{ github.ref }}" \
            -v "${{ github.workspace }}:/workspace" \
            ${{ env.LABVIEW_CONTAINER_IMAGE }} \
            bash /workspace/.github/labview/build-binaries.sh \
              /workspace \
              /workspace/ci-out/builds
        continue-on-error: true

      - name: Check report directory
        id: report
        run: |
          if [ -f "${{ github.workspace }}/ci-out/builds/index.html" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build friendly Builds report
        if: steps.report.outputs.exists == 'true'
        continue-on-error: true
        run: |
          REPORT_DIR="${{ github.workspace }}/ci-out/builds"
          python3 .github/labview/build-binaries-report.py \
            --summary   "$REPORT_DIR/summary.json" \
            --out       "$REPORT_DIR" \
            --platform  linux \
            --sha       "${{ steps.sha.outputs.sha }}" \
            --repo      "${{ github.repository }}" \
            --pages-url "${{ env.PAGES_URL }}" \
            --labview-version "${{ vars.LABVIEW_VERSION || '2026' }}" \
            --run-url   "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --commit-msg "$(git log -1 --pretty=%s   ${{ steps.sha.outputs.sha }})" \
            --author     "$(git log -1 --pretty=%an  ${{ steps.sha.outputs.sha }})" \
            --date       "$(git log -1 --pretty=%cI  ${{ steps.sha.outputs.sha }})"

      - name: Upload build artifacts
        if: steps.report.outputs.exists == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: builds-linux-${{ steps.sha.outputs.sha }}
          path: ${{ github.workspace }}/ci-out/builds/
          if-no-files-found: warn

      - name: Deploy Builds report to GitHub Pages
        if: steps.report.outputs.exists == 'true'
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: ${{ github.workspace }}/ci-out/builds
          destination_dir: builds/${{ steps.sha.outputs.sha }}/linux

      - name: Promote build artifacts to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.report.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          python3 .github/labview/promote-build-artifacts.py \
            --dist "${{ github.workspace }}/ci-out/builds/dist" \
            --out  "${{ github.workspace }}/ci-out/builds/release" \
            --os   linux --tag "$TAG"
          shopt -s nullglob
          ASSETS=(${{ github.workspace }}/ci-out/builds/release/*)
          if [ ${#ASSETS[@]} -gt 0 ]; then
            gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "No build artifacts to promote for $TAG."
          fi

      - name: Post commit status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.report.outputs.exists }}" = "true" ]; then
            REPORT_URL="${{ env.PAGES_URL }}/builds/${{ steps.sha.outputs.sha }}/linux/index.html"
          else
            REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          if [ "${{ steps.pull.outcome }}" = "success" ] && [ "${{ steps.build.outcome }}" = "success" ]; then
            STATE="success"
          else
            STATE="failure"
          fi
          DESC="Build (Linux) $STATE"
          SUMMARY="${{ github.workspace }}/ci-out/builds/summary.json"
          if [ -f "$SUMMARY" ]; then
            BUILT=$(grep -o '"built":[0-9]*' "$SUMMARY" | grep -o '[0-9]*$' || true)
            FAILED=$(grep -o '"failed":[0-9]*' "$SUMMARY" | grep -o '[0-9]*$' || true)
            if [ -n "$BUILT" ]; then DESC="${BUILT} built, ${FAILED:-0} failed (Linux)"; fi
          fi
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${{ steps.sha.outputs.sha }}" \
            -d "{\"state\":\"$STATE\",\"target_url\":\"$REPORT_URL\",\"description\":\"$DESC\",\"context\":\"CI / Builds (Linux)\"}"

      - name: Fail the job if the build failed
        if: always() && (steps.pull.outcome != 'success' || steps.build.outcome != 'success')
        run: exit 1
