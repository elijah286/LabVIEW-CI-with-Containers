# =============================================================================
# LabVIEW CI - Debug Session (interactive VNC into a worker container)
# =============================================================================
# On-demand only (Tools > Debug Run on the dashboard). Boots the worker container
# (Linux or Windows) for a chosen revision with a full graphical desktop, launches
# the LabVIEW IDE UI, and exposes it as a browser-based noVNC session over an
# ephemeral Cloudflare quick tunnel. You log into / activate LabVIEW interactively
# in the session, then press ENTER in the on-screen prompt to run the selected CI
# activities programmatically while you watch. The session tears itself down after
# `minutes` (or when the run is cancelled from the dashboard's "End session").
#
# The Linux worker serves the desktop with Xvfb + fluxbox + x11vnc; the Windows
# worker has an interactive window station, so TightVNC captures the IDE and the
# noVNC/tunnel bridge runs on the runner host. Dispatch-only + off by default ->
# never runs in normal CI.
# =============================================================================
name: LabVIEW CI - Debug Session
run-name: "Debug session (${{ github.event.inputs.platform || 'linux' }}): rev ${{ github.event.inputs.commit_sha }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Revision to debug (full commit SHA).
        required: true
      platform:
        description: "Worker platform: linux or windows."
        required: false
        default: linux
      actions:
        description: Space-separated activity ids to run on the go signal (e.g. "masscompile").
        required: false
        default: ''
      minutes:
        description: Auto-teardown after this many minutes.
        required: false
        default: '45'

permissions:
  contents: write
  packages: read

# One debug session at a time. Queue a second dispatch instead of cancelling the
# live one (the dashboard also disables Start while a session is active).
concurrency:
  group: lvci-debug
  cancel-in-progress: false

jobs:
  debug:
    # Linux debug session. A Windows dispatch runs the debug-win job below instead.
    if: ${{ (github.event.inputs.platform || 'linux') == 'linux' }}
    runs-on: ubuntu-latest
    # Hard ceiling; the session self-stops after `minutes` well before this.
    timeout-minutes: 360
    steps:
      - name: Checkout the revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0

      - name: Restore CI scripts from the default branch
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git checkout FETCH_HEAD -- .github/labview .github/actions/publish-gh-pages

      - name: Resolve Linux container image name
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "LABVIEW_CONTAINER_IMAGE=ghcr.io/${owner}/${name}:linux-latest" >> "$GITHUB_ENV"
          echo "LINUX_WORKER_WORKFLOW=Build LabVIEW CI Image - Linux" >> "$GITHUB_ENV"

      - name: Wait for the Linux worker image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/labview/wait-for-worker-image.sh "${{ github.event.inputs.commit_sha }}" "" "$LINUX_WORKER_WORKFLOW" || true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the worker image
        id: pull
        run: docker pull "$LABVIEW_CONTAINER_IMAGE"
        continue-on-error: true

      - name: Fall back to the NI base image if the worker is unavailable
        if: steps.pull.outcome != 'success'
        run: |
          echo "::warning::Worker image pull failed; using the NI Linux base image (no baked deps)."
          echo "LABVIEW_CONTAINER_IMAGE=nationalinstruments/labview:latest-linux" >> "$GITHUB_ENV"
          docker pull nationalinstruments/labview:latest-linux

      - name: Start the debug container
        run: |
          PW=$(openssl rand -hex 16)
          echo "::add-mask::$PW"
          echo "VNC_PW=$PW" >> "$GITHUB_ENV"
          docker rm -f lvci-debug >/dev/null 2>&1 || true
          docker run -d --name lvci-debug \
            -p 127.0.0.1:6080:6080 \
            -e "ACTIONS=${{ github.event.inputs.actions }}" \
            -e "MINUTES=${{ github.event.inputs.minutes }}" \
            -e "VNC_PW=$PW" \
            -e "GITHUB_REPOSITORY=${{ github.repository }}" \
            -e "GITHUB_SHA=${{ github.event.inputs.commit_sha }}" \
            -v "${{ github.workspace }}:/workspace" \
            "$LABVIEW_CONTAINER_IMAGE" \
            bash /workspace/.github/labview/debug/debug-session.sh
          sleep 3
          docker ps --filter name=lvci-debug

      - name: Start the Cloudflare quick tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /tmp/cloudflared
          chmod +x /tmp/cloudflared
          nohup /tmp/cloudflared tunnel --url http://localhost:6080 --no-autoupdate > /tmp/cf.log 2>&1 &
          echo "Waiting for the tunnel hostname..."
          url=""
          for i in $(seq 1 60); do
            url=$(grep -oE 'https://[a-z0-9-]+\.trycloudflare\.com' /tmp/cf.log | head -1 || true)
            [ -n "$url" ] && break
            sleep 2
          done
          if [ -z "$url" ]; then echo "::error::Cloudflare tunnel did not come up."; cat /tmp/cf.log || true; exit 1; fi
          echo "TUNNEL_URL=$url" >> "$GITHUB_ENV"
          echo "Tunnel: $url"

      - name: Publish the connection details
        run: |
          mkdir -p pages-debug
          novnc="${TUNNEL_URL}/vnc.html?autoconnect=true&reconnect=true&resize=scale&path=websockify&password=${VNC_PW}"
          expires=$(python3 -c "import time,sys; print(int(time.time())+int('${{ github.event.inputs.minutes }}' or 45)*60)")
          python3 - "$novnc" "$expires" > "pages-debug/${{ github.run_id }}.json" <<'PY'
          import json, sys
          print(json.dumps({"url": sys.argv[1], "expiresAt": int(sys.argv[2]),
                            "run": int("${{ github.run_id }}"),
                            "sha": "${{ github.event.inputs.commit_sha }}",
                            "platform": "linux"}))
          PY
          echo "Published connect info for run ${{ github.run_id }}."

      - name: Stage connection details to gh-pages
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: pages-debug
          destination_dir: debug
          commit_message: "Debug session connect info for run ${{ github.run_id }}"

      - name: Session summary
        run: |
          echo "### LabVIEW CI debug session is live" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Open the remote desktop: ${TUNNEL_URL}/vnc.html" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The dashboard's Debug Run dialog opens this automatically. Log into LabVIEW, then press ENTER in the on-screen prompt to run: ${{ github.event.inputs.actions }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Hold the session open until it ends
        run: |
          mins="${{ github.event.inputs.minutes }}"
          cap=$(( ${mins:-45} * 60 + 120 ))
          echo "Holding for up to ${cap}s (session self-stops after ${mins} min; cancel the run to end early)."
          timeout "${cap}s" docker wait lvci-debug || true

      - name: Tear down
        if: always()
        run: |
          echo "=== container log tail ==="
          docker logs --tail 80 lvci-debug 2>&1 || true
          docker rm -f lvci-debug >/dev/null 2>&1 || true
          pkill -f 'cloudflared tunnel' >/dev/null 2>&1 || true
          # Best-effort: remove this run's connect file from gh-pages so no stale
          # (now-dead) tunnel URL is left published.
          rm -rf /tmp/ghp && git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/ghp 2>/dev/null || true
          if [ -f "/tmp/ghp/debug/${{ github.run_id }}.json" ]; then
            cd /tmp/ghp
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -q "debug/${{ github.run_id }}.json"
            git commit -q -m "End debug session ${{ github.run_id }}"
            for i in 1 2 3 4 5; do git push origin gh-pages && break || { git fetch -q origin gh-pages && git rebase -q origin/gh-pages || true; sleep 3; }; done
          fi

  # ---------------------------------------------------------------------------
  # Windows debug session. The Windows worker container has an interactive window
  # station, so TightVNC (run as an application) captures the LabVIEW IDE window.
  # The container has no Python/cloudflared, so noVNC/websockify + the tunnel run
  # on the runner host against the container's published VNC port (5900).
  # ---------------------------------------------------------------------------
  debug-win:
    if: ${{ github.event.inputs.platform == 'windows' }}
    runs-on: windows-2022
    timeout-minutes: 360
    steps:
      - name: Checkout the revision
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0

      - name: Restore CI scripts from the default branch
        shell: bash
        run: |
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git checkout FETCH_HEAD -- .github/labview .github/actions/publish-gh-pages

      - name: Resolve Windows container image name
        shell: bash
        env:
          IMAGE_OVERRIDE: ${{ vars.LABVIEW_IMAGE_NAME }}
        run: |
          owner=$(printf '%s' "${GITHUB_REPOSITORY%%/*}" | tr '[:upper:]' '[:lower:]')
          name="${IMAGE_OVERRIDE:-${GITHUB_REPOSITORY##*/}-labview}"
          name=$(printf '%s' "$name" | tr '[:upper:]' '[:lower:]')
          echo "LABVIEW_CONTAINER_IMAGE=ghcr.io/${owner}/${name}:latest" >> "$GITHUB_ENV"
          echo "WIN_WORKER_WORKFLOW=Build LabVIEW CI Image" >> "$GITHUB_ENV"

      - name: Wait for the Windows worker image
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/labview/wait-for-worker-image.sh "${{ github.event.inputs.commit_sha }}" "" "$WIN_WORKER_WORKFLOW" || true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the worker image
        id: pull
        shell: bash
        run: docker pull "$LABVIEW_CONTAINER_IMAGE"
        continue-on-error: true

      - name: Fall back to the NI base image if the worker is unavailable
        if: steps.pull.outcome != 'success'
        shell: bash
        run: |
          echo "::warning::Worker image pull failed; using the NI Windows base image (no baked deps)."
          echo "LABVIEW_CONTAINER_IMAGE=nationalinstruments/labview:latest-windows" >> "$GITHUB_ENV"
          docker pull nationalinstruments/labview:latest-windows

      - name: Start the debug container
        shell: pwsh
        run: |
          $pw = -join ((1..32) | ForEach-Object { '{0:x}' -f (Get-Random -Maximum 16) })
          Write-Host "::add-mask::$pw"
          "VNC_PW=$pw" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
          docker rm -f lvci-debug 2>$null | Out-Null
          docker run -d --name lvci-debug `
            -p 127.0.0.1:5900:5900 `
            -e "ACTIONS=${{ github.event.inputs.actions }}" `
            -e "MINUTES=${{ github.event.inputs.minutes }}" `
            -e "VNC_PW=$pw" `
            -e "GITHUB_REPOSITORY=${{ github.repository }}" `
            -e "GITHUB_SHA=${{ github.event.inputs.commit_sha }}" `
            -v "${{ github.workspace }}:C:\workspace" `
            $env:LABVIEW_CONTAINER_IMAGE `
            powershell -NoProfile -ExecutionPolicy Bypass -File C:\workspace\.github\labview\debug\debug-session.ps1
          Start-Sleep -Seconds 3
          docker ps --filter name=lvci-debug

      - name: Bring up noVNC + Cloudflare tunnel on the host
        shell: pwsh
        run: |
          python -m pip install --quiet --disable-pip-version-check websockify
          if (-not (Test-Path "$env:TEMP\novnc\vnc.html")) { git clone --depth 1 https://github.com/novnc/noVNC "$env:TEMP\novnc" }
          Start-Process python -ArgumentList @('-m','websockify','--web',"$env:TEMP\novnc",'6080','127.0.0.1:5900') -WindowStyle Hidden
          Invoke-WebRequest -UseBasicParsing -Uri 'https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe' -OutFile "$env:TEMP\cloudflared.exe"
          Start-Process "$env:TEMP\cloudflared.exe" -ArgumentList @('tunnel','--url','http://localhost:6080','--no-autoupdate') -RedirectStandardOutput "$env:TEMP\cf.log" -RedirectStandardError "$env:TEMP\cf.err" -WindowStyle Hidden
          $url = ''
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 2
            $txt = (Get-Content "$env:TEMP\cf.log","$env:TEMP\cf.err" -ErrorAction SilentlyContinue) -join "`n"
            $m = [regex]::Match($txt, 'https://[a-z0-9-]+\.trycloudflare\.com')
            if ($m.Success) { $url = $m.Value; break }
          }
          if (-not $url) { Write-Host '::error::Cloudflare tunnel did not come up.'; Get-Content "$env:TEMP\cf.log","$env:TEMP\cf.err" -ErrorAction SilentlyContinue; exit 1 }
          "TUNNEL_URL=$url" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
          Write-Host "Tunnel: $url"

      - name: Publish the connection details
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pages-debug | Out-Null
          $novnc = "$env:TUNNEL_URL/vnc.html?autoconnect=true&reconnect=true&resize=scale&path=websockify&password=$env:VNC_PW"
          $mins = "${{ github.event.inputs.minutes }}"; if (-not $mins) { $mins = '45' }
          $expires = [int][double]::Parse((Get-Date -UFormat %s)) + ([int]$mins * 60)
          $obj = [ordered]@{ url = $novnc; expiresAt = $expires; run = [long]"${{ github.run_id }}"; sha = "${{ github.event.inputs.commit_sha }}"; platform = 'windows' }
          ($obj | ConvertTo-Json -Compress) | Out-File -Encoding ascii "pages-debug/${{ github.run_id }}.json"
          Write-Host "Published connect info for run ${{ github.run_id }}."

      - name: Stage connection details to gh-pages
        uses: ./.github/actions/publish-gh-pages
        with:
          publish_dir: pages-debug
          destination_dir: debug
          commit_message: "Debug session connect info for run ${{ github.run_id }}"

      - name: Session summary
        shell: bash
        run: |
          echo "### LabVIEW CI debug session is live (Windows)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Open the remote desktop: ${TUNNEL_URL}/vnc.html" >> "$GITHUB_STEP_SUMMARY"

      - name: Hold the session open until it ends
        shell: pwsh
        run: |
          $mins = "${{ github.event.inputs.minutes }}"; if (-not $mins) { $mins = '45' }
          Write-Host "Holding until the container stops (self-stops after $mins min; cancel the run to end early)."
          docker wait lvci-debug | Out-Null

      - name: Tear down
        if: always()
        shell: pwsh
        run: |
          Write-Host '=== container log tail ==='
          docker logs --tail 100 lvci-debug 2>&1
          docker rm -f lvci-debug 2>$null | Out-Null
          Get-Process cloudflared, python -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:TEMP\ghp" -ErrorAction SilentlyContinue
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$env:TEMP\ghp" 2>$null
          if (Test-Path "$env:TEMP\ghp\debug\${{ github.run_id }}.json") {
            Push-Location "$env:TEMP\ghp"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -q "debug/${{ github.run_id }}.json"
            git commit -q -m "End debug session ${{ github.run_id }}"
            for ($i = 0; $i -lt 5; $i++) { git push origin gh-pages; if ($LASTEXITCODE -eq 0) { break }; git fetch -q origin gh-pages; git rebase -q origin/gh-pages 2>$null; Start-Sleep -Seconds 3 }
            Pop-Location
          }
