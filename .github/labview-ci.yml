# .github/labview-ci.yml - LabVIEW CI configuration
# Updated by the Reconfigure workflow.
schemaVersion: 1
installedVersion: 1.0.0
configuredAt: 2026-07-21T18:41:15Z
config:
  labviewVersion: "2026"
  os: [windows, linux]
  concurrency:
    maxParallel: 5
  container:
    use: latest
activities:
  - dashboard
  - masscompile
  - vi-analyzer
  - vidiff
  - snapshots
  - snapshots-2
  - unit-tests

unitTests:
  thresholds:
    passedPercent:
      greenAtLeast: 100
      yellowAtLeast: 80
      redBelow: 80
  tools:
    caraya:
      enabled: false
      locations: []
    vi-tester:
      enabled: false
      locations: []
    utf:
      enabled: true
      locations:
        - "example/User-Defined Test/"
